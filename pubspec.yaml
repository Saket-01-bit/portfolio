name: saket_portfolio
description: Saket Jain - Flutter Developer Portfolio
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2
  video_player: ^2.11.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/gallery/events/
    - assets/gallery/participations/
    - assets/gallery/certifications/
    - assets/gallery/moments/
